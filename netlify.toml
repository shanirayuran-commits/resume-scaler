# Netlify Configuration for Rate My Resume
# Deployment and build settings

[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

# Environment variables
[build.environment]
  NODE_VERSION = "18.17.0"
  NODE_ENV = "production"
  NODE_OPTIONS = "--openssl-legacy-provider"

# Redirect all routes to Next.js for proper SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache settings
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Rewrite rules for API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
